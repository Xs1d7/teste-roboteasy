name: CI

on:
  push:
  pull_request:

jobs:
  dotnet:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      MONGO_TEST_URL: mongodb://localhost:27017

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: |
          dotnet restore services/auth/Auth.Api.csproj
          dotnet restore services/chat/Chat.Api.csproj
          dotnet restore tests/Chat.Api.Tests/Chat.Api.Tests.csproj

      - name: Build Auth
        run: dotnet build services/auth/Auth.Api.csproj --no-restore -c Release

      - name: Build Chat
        run: dotnet build services/chat/Chat.Api.csproj --no-restore -c Release

      - name: Test
        run: dotnet test tests/Chat.Api.Tests --no-restore -c Release -v minimal

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build
