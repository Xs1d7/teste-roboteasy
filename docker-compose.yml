services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: roboteasy_auth
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  auth:
    build: ./services/auth
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=roboteasy_auth;Username=postgres;Password=postgres
      Jwt__Key: roboteasy-dev-secret-key-change-me-32chars!
      Jwt__Issuer: roboteasy-auth
      Jwt__Audience: roboteasy
    depends_on:
      postgres:
        condition: service_healthy

  chat:
    build: ./services/chat
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Mongo: mongodb://mongo:27017
      ConnectionStrings__RabbitMQ: amqp://guest:guest@rabbitmq:5672
      Mongo__Database: roboteasy_chat
      Jwt__Key: roboteasy-dev-secret-key-change-me-32chars!
      Jwt__Issuer: roboteasy-auth
      Jwt__Audience: roboteasy
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - auth
      - chat

volumes:
  pgdata:
  mongodata:
