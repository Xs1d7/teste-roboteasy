x-chat-env: &chat-env
  ASPNETCORE_ENVIRONMENT: Production
  Swagger__Enabled: "true"
  ConnectionStrings__Mongo: mongodb://mongo:27017
  ConnectionStrings__RabbitMQ: amqp://guest:guest@rabbitmq:5672
  ConnectionStrings__Redis: redis:6379
  Mongo__Database: roboteasy_chat
  Jwt__Key: roboteasy-dev-secret-key-change-me-32chars!
  Jwt__Issuer: roboteasy-auth
  Jwt__Audience: roboteasy

x-chat-depends: &chat-depends
  mongo:
    condition: service_healthy
  rabbitmq:
    condition: service_healthy
  redis:
    condition: service_healthy

x-chat-health: &chat-health
  test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
  interval: 5s
  timeout: 5s
  retries: 12
  start_period: 30s

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: roboteasy_auth
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # MinIO simula S3 localmente (em prod: AWS S3 / GCS compatível)
  minio:
    image: quay.io/minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - ./minio/data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s 

  auth:
    build: ./services/auth
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Swagger__Enabled: "true"
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=roboteasy_auth;Username=postgres;Password=postgres
      Jwt__Key: roboteasy-dev-secret-key-change-me-32chars!
      Jwt__Issuer: roboteasy-auth
      Jwt__Audience: roboteasy
      Storage__ServiceUrl: http://minio:9000
      Storage__AccessKey: admin
      Storage__SecretKey: password123
      Storage__ForcePathStyle: "true"
      Storage__AvatarBucket: user-avatars
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Duas replicas do Chat — Redis backplane + nginx ip_hash (sticky)
  chat-a:
    build: ./services/chat
    ports:
      - "5002:8080"
    environment:
      <<: *chat-env
    depends_on:
      <<: *chat-depends
    healthcheck:
      <<: *chat-health

  chat-b:
    build: ./services/chat
    environment:
      <<: *chat-env
    depends_on:
      <<: *chat-depends
    healthcheck:
      <<: *chat-health

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      auth:
        condition: service_healthy
      chat-a:
        condition: service_healthy
      chat-b:
        condition: service_healthy

volumes:
  pgdata:
  mongodata:
